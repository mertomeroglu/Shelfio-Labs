services:
  postgres:
    image: postgres:16-alpine
    container_name: shelfio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shelfio_local}
      POSTGRES_USER: ${POSTGRES_USER:-shelfio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shelfio_local_password}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - shelfio_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  shelfio_postgres_data:
